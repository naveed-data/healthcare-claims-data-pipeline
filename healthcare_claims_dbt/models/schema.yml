version: 2

models:
  - name: stg_claims
    description: Staging model for healthcare claims
    columns:
      - name: claim_id
        tests:
          - unique
          - not_null

      - name: patient_id
        tests:
          - not_null

      - name: provider_id
        tests:
          - not_null

      - name: claim_amount
        tests:
          - not_null

  - name: stg_patients
    description: Patient dimension
    columns:
      - name: patient_id
        tests:
          - unique
          - not_null

  - name: stg_providers
    description: Provider dimension
    columns:
      - name: provider_id
        tests:
          - unique
          - not_null
